apiVersion: apps/v1
kind: Deployment
metadata:
  name: fiap-soat-tech-challenge-app
  labels:
    app: fiap-soat-tech-challenge-app
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: fiap-soat-tech-challenge-app
  template:
    metadata:
      labels:
        app: fiap-soat-tech-challenge-app
      annotations:
        deploy/timestamp: "${GITHUB_SHA}"
    spec:
      automountServiceAccountToken: false
      containers:
        - name: app
          image: ${IMAGE_URI}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: fiap-soat-tech-challenge-app-config
            - secretRef:
                name: fiap-soat-tech-challenge-app-secret
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
              ephemeral-storage: "256Mi"
            limits:
              cpu: "750m"
              memory: "768Mi"
              ephemeral-storage: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
