name: CD - Build, Push to ECR and Deploy to EKS

# Trigger the workflow manually from the GitHub Actions tab or via API
# Avoid to deploy on every pull request on AWS Academy environment, 
# since it has limited resources

on:
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'fiap-tech-challenge' }}
  APP_NAME: fiap-soat-tech-challenge-app

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_uri: ${{ steps.meta.outputs.image_uri }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image metadata
        id: meta
        run: |
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          TAG="${GITHUB_SHA::7}"
          URI="$REGISTRY/$ECR_REPOSITORY:$TAG"
          echo "image_tag=$TAG"  >> "$GITHUB_OUTPUT"
          echo "image_uri=$URI"  >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_uri }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name   "$EKS_CLUSTER_NAME"

      - name: Ensure namespace exists
        run: |
          kubectl get namespace "$K8S_NAMESPACE" >/dev/null 2>&1 \
            || kubectl create namespace "$K8S_NAMESPACE"

      - name: Apply ConfigMap
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_EXPIRES_IN: ${{ vars.JWT_EXPIRES_IN || '24h' }}
        run: |
          kubectl -n "$K8S_NAMESPACE" create configmap "${APP_NAME}-config" \
            --from-literal=DB_HOST="$DB_HOST" \
            --from-literal=DB_PORT="$DB_PORT" \
            --from-literal=DB_NAME="$DB_NAME" \
            --from-literal=APP_PORT="3000" \
            --from-literal=NODE_ENV="production" \
            --from-literal=JWT_EXPIRES_IN="$JWT_EXPIRES_IN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Secret
        env:
          DB_USER:    ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          kubectl -n "$K8S_NAMESPACE" create secret generic "${APP_NAME}-secret" \
            --from-literal=DB_USER="$DB_USER" \
            --from-literal=DB_PASSWORD="$DB_PASSWORD" \
            --from-literal=JWT_SECRET="$JWT_SECRET" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Delete previous migration Job (Jobs are immutable)
        run: |
          kubectl -n "$K8S_NAMESPACE" delete job ${APP_NAME}-migrate \
            --ignore-not-found=true --wait=true

      - name: Render & apply manifests
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          for f in k8s/*.yaml; do
            echo "Applying $f"
            envsubst '${IMAGE_URI} ${GITHUB_SHA}' < "$f" | kubectl -n "$K8S_NAMESPACE" apply -f -
          done

      - name: Wait for migration Job
        run: |
          kubectl -n "$K8S_NAMESPACE" wait --for=condition=complete \
            job/${APP_NAME}-migrate --timeout=300s || \
            (kubectl -n "$K8S_NAMESPACE" logs job/${APP_NAME}-migrate --tail=200; exit 1)

      - name: Wait for rollout
        run: |
          kubectl -n "$K8S_NAMESPACE" rollout status \
            deployment/${APP_NAME} --timeout=300s

      - name: Show service
        run: |
          kubectl -n "$K8S_NAMESPACE" get svc,deploy,pods,hpa
